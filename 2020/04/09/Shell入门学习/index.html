ss="line">182</span><br><span class="line">183</span><br><span class="line">184</span><br><span class="line">185</span><br><span class="line">186</span><br></pre></div></td><td class="code"><div class="hljs code-wrapper"><pre><code class="hljs bash"><span class="hljs-meta">#!/bin/bash</span><br><span class="hljs-built_in">echo</span> -e <span class="hljs-string">"hello, world\n"</span><br><span class="hljs-comment"># 1.变量的定义使用</span><br>my_name=lexssama<br><span class="hljs-built_in">echo</span> <span class="hljs-string">"1.<span class="hljs-variable">$my_name</span>"</span><br><span class="hljs-comment"># 2. 另一种定义方式</span><br>course=<span class="hljs-string">"linux start"</span><br><span class="hljs-built_in">echo</span> 2. <span class="hljs-variable">$&#123;course&#125;</span><br><span class="hljs-comment"># 3. 只读变量</span><br><span class="hljs-built_in">readonly</span> course<br>course=<span class="hljs-string">"linux kernel"</span> <span class="hljs-comment">#readonly 不能写入(改变)</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"3. <span class="hljs-variable">$&#123;course&#125;</span>"</span> <span class="hljs-comment"># 输出的还是linux start</span><br><span class="hljs-comment"># 4.删除变量</span><br><span class="hljs-built_in">unset</span> my_name <br><span class="hljs-built_in">echo</span> <span class="hljs-string">"4.<span class="hljs-variable">$&#123;my_name&#125;</span>"</span><br><span class="hljs-comment"># 5.export 导出一个环境变量</span><br><span class="hljs-built_in">export</span> MY_NAME=<span class="hljs-string">"lexssama"</span><br><span class="hljs-comment"># 6. 查找自定义的环境变量</span><br>env | grep MY_NAME<br><span class="hljs-comment"># 7. 特殊变量</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"文件名称: <span class="hljs-variable">$0</span>"</span> <span class="hljs-comment"># 特殊变量$0表示脚本文件的名称</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"参数１: <span class="hljs-variable">$1</span>"</span> <span class="hljs-comment">#特殊变量$1表示传入第一个参数</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"参数２: <span class="hljs-variable">$2</span>"</span> <span class="hljs-comment">#特殊变量$2表示传入第二个参数</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"参数３: <span class="hljs-variable">$3</span>"</span> <span class="hljs-comment">#特殊变量$3表示传入第三个参数</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"全部参数: <span class="hljs-variable">$@</span>"</span> <span class="hljs-comment">#特殊参数$@表示传入的所有参数</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"参数个数: <span class="hljs-variable">$#</span>"</span> <span class="hljs-comment">#特殊参数$#表示传入参数的个数</span><br><span class="hljs-comment"># 8. 基本运算</span><br><span class="hljs-comment"># 8.1 算术运算 (加减乘除取余，+-*/%)</span><br>a=16<br>b=17<br><span class="hljs-comment"># 加法expr 用加法举例子</span><br>var0=`expr <span class="hljs-variable">$a</span>+<span class="hljs-variable">$b</span>`<br><span class="hljs-built_in">echo</span> <span class="hljs-string">"<span class="hljs-variable">$a</span>+<span class="hljs-variable">$b</span>=<span class="hljs-variable">$var0</span>"</span><br><span class="hljs-comment"># 另一种运算方式</span><br>var1=$[<span class="hljs-variable">$a</span>+<span class="hljs-variable">$b</span>] <br><span class="hljs-built_in">echo</span> <span class="hljs-string">"<span class="hljs-variable">$a</span>+<span class="hljs-variable">$b</span>=<span class="hljs-variable">$var1</span>"</span><br><br><span class="hljs-comment">#8.2 关系运算</span><br><span class="hljs-comment"># -eq(相等) -ne(不相等) -gt(大于) -ge(大于等于) -lt(小于) -le(小于等于)</span><br><span class="hljs-keyword">if</span> [ <span class="hljs-variable">$a</span> -eq <span class="hljs-variable">$b</span> ] <span class="hljs-comment">#注意格式是[空格$a.....$b空格]</span><br><span class="hljs-keyword">then</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"<span class="hljs-variable">$a</span> -eq <span class="hljs-variable">$b</span> : a 等于 b"</span><br><span class="hljs-keyword">else</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"<span class="hljs-variable">$a</span> -eq <span class="hljs-variable">$b</span> : a 不等于 b"</span><br><span class="hljs-keyword">fi</span><br><span class="hljs-comment"># 8.3 布尔与逻辑运算</span><br><span class="hljs-comment"># ! 非运算</span><br><span class="hljs-comment"># -o 或运算</span><br><span class="hljs-comment"># -a 与运算</span><br><span class="hljs-comment"># &amp;&amp; 逻辑与 (逻辑与和与运算是不一样的，一个逻辑判断true,false 一个是二进制运算</span><br><span class="hljs-comment"># || 逻辑或</span><br><span class="hljs-comment"># == 相等(仅仅限于数字比较)</span><br><span class="hljs-comment"># != 不相等(仅仅限于数字比较)</span><br><span class="hljs-keyword">if</span> [[ <span class="hljs-variable">$a</span> -gt 0 &amp;&amp; <span class="hljs-variable">$b</span> -gt 0 ]] <span class="hljs-comment">#注意格式是[[空格$a.....$b空格]],并且逻辑判断是[[</span><br><span class="hljs-keyword">then</span> <br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"a,b都大于0"</span><br><span class="hljs-keyword">fi</span><br><span class="hljs-comment"># 8.4文件测试运算</span><br><span class="hljs-comment"># -d 是否为目录</span><br><span class="hljs-comment"># -f 是否为普通文件</span><br><span class="hljs-comment"># -r -w -x 是否可读，可写，可执行</span><br><span class="hljs-comment"># -s 文件是否为空</span><br><span class="hljs-comment"># -e 文件是否存在</span><br>file=<span class="hljs-variable">$0</span><br><span class="hljs-keyword">if</span> [ -f <span class="hljs-variable">$file</span> ]<br><span class="hljs-keyword">then</span> <br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"为普通文件"</span><br><span class="hljs-keyword">fi</span><br><span class="hljs-keyword">if</span> [ -e <span class="hljs-variable">$file</span> ]<br><span class="hljs-keyword">then</span> <br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"文件存在"</span><br><span class="hljs-keyword">else</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"文件不存在"</span><br><span class="hljs-keyword">fi</span><br><span class="hljs-keyword">if</span> [ -r <span class="hljs-variable">$file</span> ]<br><span class="hljs-keyword">then</span> <br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"文件可读"</span><br><span class="hljs-keyword">else</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"文件不可读"</span><br><span class="hljs-keyword">fi</span> <br><span class="hljs-keyword">if</span> [ -w <span class="hljs-variable">$file</span> ]<br><span class="hljs-keyword">then</span> <br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"文件可写"</span><br><span class="hljs-keyword">else</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"文件不可写"</span><br><span class="hljs-keyword">fi</span><br><span class="hljs-keyword">if</span> [ -x <span class="hljs-variable">$file</span> ]<br><span class="hljs-keyword">then</span> <br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"文件可执行"</span><br><span class="hljs-keyword">else</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"文件不可执行"</span><br><span class="hljs-keyword">fi</span><br><span class="hljs-comment"># 9.字符串</span><br><span class="hljs-comment"># 单引号：原样输出，变量无效</span><br><span class="hljs-comment"># 双引号：可以包含变量</span><br>course1=<span class="hljs-string">"Linux-shell入门学习"</span><br><span class="hljs-comment"># 单引号</span><br>questions=<span class="hljs-string">'Linux-shell入门学习：$course!'</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"<span class="hljs-variable">$questions</span>"</span><br><span class="hljs-comment"># 双引号</span><br>answer=<span class="hljs-string">"请学习&lt;&lt;<span class="hljs-variable">$course1</span>&gt;&gt;课程!"</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"<span class="hljs-variable">$answer</span>"</span><br><br><span class="hljs-comment"># 字符串拼接</span><br><span class="hljs-built_in">echo</span> -e <span class="hljs-string">"拼接后一起输出:\n"</span><span class="hljs-variable">$questions</span> <span class="hljs-string">"\n"</span> <span class="hljs-variable">$answer</span><br><span class="hljs-comment">#字符串长度(命令: $&#123;#str&#125;)</span><br>str=<span class="hljs-string">"hello,world"</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"字符串"</span><span class="hljs-variable">$str</span><span class="hljs-string">"的长度为:"</span><span class="hljs-variable">$&#123;#str&#125;</span><br><span class="hljs-comment">#获取子串，从第一个字符开始截取三个(命令: $&#123;str:1:3&#125;)</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"字符串"</span><span class="hljs-variable">$str</span><span class="hljs-string">"子串:"</span><span class="hljs-variable">$&#123;str:1:3&#125;</span><br><span class="hljs-comment">#查找子串(命令: `expr index "$str" wo`)</span><br>matched=`expr index <span class="hljs-string">"<span class="hljs-variable">$str</span>"</span> wo`<br><span class="hljs-built_in">echo</span> <span class="hljs-string">"字符串"</span><span class="hljs-variable">$str</span><span class="hljs-string">"查找wo的位置在"</span><span class="hljs-variable">$matched</span><br><span class="hljs-comment"># 9.1 字符串运算符号</span><br><span class="hljs-comment"># = 字符串是否相等　[ $a = $b ]</span><br><span class="hljs-comment"># != 字符串是否不相等　[ $a != $b ]</span><br><span class="hljs-comment"># -z 字符串长度是否为0 [ -z $a ]</span><br><span class="hljs-comment"># -n 字符串长度是否不为0 [ -n "$a" ]</span><br><span class="hljs-comment"># $　字符串是否为空　[ $a ]</span><br><br><br><span class="hljs-comment"># 10. 数组</span><br><span class="hljs-comment"># 10.1 数组的定义</span><br>arr=(<span class="hljs-string">"aa"</span> <span class="hljs-string">"bb"</span> <span class="hljs-string">"cc"</span> <span class="hljs-string">"hello world"</span>)<br><span class="hljs-comment"># 10.2 设置　元素</span><br>arr[2]=<span class="hljs-string">"222"</span><br><span class="hljs-comment"># 10.3 读取　元素</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"下标为2的元素:"</span><span class="hljs-variable">$&#123;arr[2]&#125;</span><br><span class="hljs-comment"># 10.4 读取　所有元素</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"所有元素: "</span><span class="hljs-variable">$&#123;arr[@]&#125;</span><br><span class="hljs-comment"># 10.5 获取数组的长度</span><br>len=<span class="hljs-variable">$&#123;#arr[@]&#125;</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"数组长度: <span class="hljs-variable">$len</span>"</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"数组长度: "</span><span class="hljs-variable">$&#123;#arr[@]&#125;</span><br><br><span class="hljs-comment"># 11.分支 (if else , case)</span><br><span class="hljs-comment"># 11.1 if else </span><br><br>age=20<br><span class="hljs-keyword">if</span> [ <span class="hljs-variable">$age</span> -le 10 ] <span class="hljs-comment"># &lt;=10</span><br><span class="hljs-keyword">then</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"少年"</span><br><span class="hljs-keyword">elif</span> [ <span class="hljs-variable">$age</span> -le 20 ]  <span class="hljs-comment"># &lt;=20 注意是elif</span><br><span class="hljs-keyword">then</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"青年"</span><br><span class="hljs-keyword">elif</span> [ <span class="hljs-variable">$age</span> -le 50 ]  <span class="hljs-comment"># &lt;=50</span><br><span class="hljs-keyword">then</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"中年"</span><br><span class="hljs-keyword">else</span> <span class="hljs-comment"># &gt;50</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"老年"</span><br><span class="hljs-keyword">fi</span><br><br><span class="hljs-comment"># 11.2 case </span><br>status=1<br><span class="hljs-keyword">case</span> <span class="hljs-variable">$status</span> <span class="hljs-keyword">in</span><br>	0) <span class="hljs-built_in">echo</span> <span class="hljs-string">"todo"</span> ;;<br>	1) <span class="hljs-built_in">echo</span> <span class="hljs-string">"doing"</span> ;;<br>	2) <span class="hljs-built_in">echo</span> <span class="hljs-string">"done"</span> ;;<br><span class="hljs-keyword">esac</span><br><br><span class="hljs-comment"># 12.循环</span><br><span class="hljs-comment"># for...in..do...done</span><br><span class="hljs-comment"># while...do...done</span><br><span class="hljs-comment"># util...do...done</span><br><span class="hljs-comment"># break</span><br><span class="hljs-keyword">for</span> item <span class="hljs-keyword">in</span> <span class="hljs-variable">$&#123;arr[@]&#125;</span><br><span class="hljs-keyword">do</span><br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"<span class="hljs-variable">$item</span>"</span><br><span class="hljs-keyword">done</span><br><br><span class="hljs-comment"># 13. 函数</span><br><span class="hljs-comment"># function关键字可加可不加 </span><br><span class="hljs-comment"># 函数后面的()可加可不加</span><br><span class="hljs-keyword">function</span> myfun()<br>&#123;<br>	<span class="hljs-built_in">echo</span> <span class="hljs-string">"这是shell函数!"</span><br>&#125;<br>myfun<br><span class="hljs-comment"># 函数传参和返回值</span><br><span class="hljs-keyword">function</span> add()<br>&#123;<br>	<span class="hljs-built_in">local</span> ret=$((<span class="hljs-variable">$1</span>+<span class="hljs-variable">$2</span>))<br>	<span class="hljs-built_in">return</span> <span class="hljs-variable">$ret</span><br>&#125;<br>add 5 8<br><span class="hljs-built_in">echo</span> $?<br></code></pre></div></td></tr></table></figure>
